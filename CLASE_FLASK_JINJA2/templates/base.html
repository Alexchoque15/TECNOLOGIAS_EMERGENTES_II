<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

<title>NOVA TECNOLOGY</title>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
<div class="container">
<a class="navbar-brand fw-bold" href="/">
<i class="bi bi-cpu"></i> NOVA TECNOLOGY
</a>

<div class="navbar-nav ms-auto">
<a class="nav-link" href="/"><i class="bi bi-house"></i></a>
<a class="nav-link" href="/contacto"><i class="bi bi-envelope"></i></a>
<a class="nav-link" href="/contactos"><i class="bi bi-table"></i></a>
<a class="nav-link" href="/dashboard"><i class="bi bi-bar-chart"></i></a>
</div>
</div>
</nav>

<div class="container mt-4">

{% with messages = get_flashed_messages(with_categories=true) %}
{% for category, message in messages %}
<div class="alert alert-{{ category }}">
<i class="bi bi-info-circle"></i> {{ message }}
</div>
{% endfor %}
{% endwith %}

{% block content %}{% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
