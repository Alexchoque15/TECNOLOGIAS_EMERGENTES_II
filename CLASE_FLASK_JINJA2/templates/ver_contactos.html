{% extends "base.html" %}
{% block content %}

<h2><i class="bi bi-table"></i> Contactos</h2>

<table class="table table-dark table-hover mt-3">
<thead>
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Email</th>
<th>Acciones</th>
</tr>
</thead>

<tbody>
{% for c in contactos %}
<tr>
<td>{{ c.id }}</td>
<td>{{ c.nombre }}</td>
<td>{{ c.email }}</td>
<td>
<a href="/editar/{{ c.id }}" class="btn btn-warning btn-sm">
<i class="bi bi-pencil"></i>
</a>

<a href="/eliminar/{{ c.id }}" class="btn btn-danger btn-sm"
onclick="return confirm('¿Eliminar contacto?')">
<i class="bi bi-trash"></i>
</a>
</td>
</tr>
{% endfor %}
</tbody>

</table>

{% endblock %}
