{% extends "base.html" %}
{% block content %}

<h2 class="mb-4">
    <i class="bi bi-table"></i> Lista de Contactos
</h2>

<div class="card shadow">
<div class="card-body">

<table class="table table-bordered table-hover align-middle">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Email</th>
            <th>Mensaje</th>
        </tr>
    </thead>
    <tbody>

        {% for c in contactos %}
        <tr>
            <td>{{ c.id }}</td>
            <td>{{ c.nombre }}</td>
            <td>{{ c.email }}</td>
            <td>{{ c.mensaje }}</td>
        </tr>
        {% endfor %}

        {% if contactos|length == 0 %}
        <tr>
            <td colspan="4" class="text-center text-muted">
                No hay contactos registrados
            </td>
        </tr>
        {% endif %}

    </tbody>
</table>

</div>
</div>

{% endblock %}
