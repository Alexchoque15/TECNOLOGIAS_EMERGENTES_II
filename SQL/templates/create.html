<!DOCTYPE html>
<html>
<head>
    <title>Crear</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2>Crear Producto</h2>

    <form method="post" class="card p-4">
        <input name="name" class="form-control mb-2" placeholder="Nombre" required>
        <input name="price" type="number" step="0.01" class="form-control mb-2" placeholder="Precio" required>
        <input name="stock" type="number" class="form-control mb-2" placeholder="Stock" required>

        <button class="btn btn-success">Guardar</button>
        <a href="/" class="btn btn-secondary">Volver</a>
    </form>

</div>

</body>
</html>
