<!DOCTYPE html>
<html>
<head>
    <title>Editar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2>Editar Producto</h2>

    <form method="post" class="card p-4">
        <input name="name" value="{{ product.name }}" class="form-control mb-2" required>
        <input name="price" type="number" step="0.01" value="{{ product.price }}" class="form-control mb-2" required>
        <input name="stock" type="number" value="{{ product.stock }}" class="form-control mb-2" required>

        <button class="btn btn-primary">Actualizar</button>
        <a href="/" class="btn btn-secondary">Volver</a>
    </form>

</div>

</body>
</html>
