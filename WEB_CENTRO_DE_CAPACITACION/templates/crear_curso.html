{% extends 'base.html' %}

{% block content %}

<h2 class="text-2xl font-bold mb-4">Crear Curso</h2>

<form method="POST" enctype="multipart/form-data" class="space-y-4">

<input name="titulo" placeholder="Título" class="w-full p-2 border rounded">

<textarea name="descripcion" placeholder="Descripción"
class="w-full p-2 border rounded"></textarea>

<input name="precio" type="number" placeholder="Precio"
class="w-full p-2 border rounded">

<input type="file" name="imagen" accept="image/*"
class="w-full p-2 border rounded">

<button class="bg-indigo-600 text-white px-4 py-2 rounded">
Crear
</button>

</form>

{% endblock %}
